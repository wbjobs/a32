syntax = "proto3";

package slowquery;

option go_package = "github.com/trae3/slowquery-lineage/pkg/slowquery";

service SlowQueryService {
  rpc StreamSlowLog(stream SlowLogEntry) returns (stream Ack);
}

message SlowLogEntry {
  string agent_id = 1;
  string raw_line = 2;
  string timestamp = 3;
  double query_time = 4;
  double lock_time = 5;
  int64 rows_sent = 6;
  int64 rows_examined = 7;
  string sql = 8;
  string database = 9;
}

message Ack {
  bool ok = 1;
  string message = 2;
  int32 sequence = 3;
}

message HeatQueryRequest {
  string start_time = 1;
  string end_time = 2;
  int32 top_n = 3;
}

message TableHeat {
  string table_name = 1;
  double heat_score = 2;
  int64 slow_query_count = 3;
  double total_query_time = 4;
  double total_lock_time = 5;
  repeated string affected_fields = 6;
}

message HeatQueryResponse {
  repeated TableHeat tables = 1;
  string start_time = 2;
  string end_time = 3;
  int32 total_slow_queries = 4;
}
